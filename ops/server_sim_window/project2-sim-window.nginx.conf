server {
    listen 8081;
    listen [::]:8081;
    server_name _;

    root /opt/apps/project2-sim-window;
    index index.html;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-store";
    }

    location /data/ {
        alias /opt/apps/project2-sim-data/;
        autoindex off;
        add_header Cache-Control "no-store";
        add_header Content-Type "application/json" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.html;
    }
}
